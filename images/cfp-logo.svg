<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Shield background -->
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14451E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A2714;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C96A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer shield -->
  <path d="M100 10 L180 40 L180 110 Q180 165 100 195 Q20 165 20 110 L20 40 Z"
    fill="url(#shieldGrad)"
    stroke="#C9A84C"
    stroke-width="3"/>

  <!-- Inner gold border -->
  <path d="M100 22 L168 48 L168 112 Q168 158 100 183 Q32 158 32 112 L32 48 Z"
    fill="none"
    stroke="#C9A84C"
    stroke-width="1.5"
    opacity="0.5"/>

  <!-- Chess knight piece -->
  <!-- Base -->
  <rect x="70" y="155" width="60" height="8" rx="2" fill="url(#goldGrad)"/>
  <!-- Stem -->
  <rect x="84" y="142" width="32" height="14" rx="3" fill="url(#goldGrad)"/>
  <!-- Body -->
  <ellipse cx="100" cy="130" rx="22" ry="14" fill="url(#goldGrad)"/>
  <!-- Neck -->
  <rect x="86" y="112" width="28" height="22" rx="8" fill="url(#goldGrad)"/>
  <!-- Head -->
  <ellipse cx="105" cy="105" rx="18" ry="14" fill="url(#goldGrad)"/>
  <!-- Snout -->
  <ellipse cx="118" cy="110" rx="10" ry="7" fill="url(#goldGrad)"/>
  <!-- Ear -->
  <polygon points="98,90 105,72 112,90" fill="url(#goldGrad)"/>
  <!-- Nostril / eye -->
  <circle cx="113" cy="107" r="2.5" fill="#0A2714"/>

  <!-- Green and white stripes (Pakistan flag colors reference) -->
  <rect x="36" y="90" width="14" height="5" rx="1" fill="#01411C" opacity="0.6"/>
  <rect x="36" y="97" width="14" height="5" rx="1" fill="#FFFFFF" opacity="0.4"/>

  <!-- Text: CFP -->
  <text x="100" y="52" text-anchor="middle"
    font-family="Georgia, serif"
    font-size="18"
    font-weight="bold"
    fill="#C9A84C"
    letter-spacing="4">CFP</text>

  <!-- Stars decoration (like Pakistan flag) -->
  <polygon points="48,62 50,56 52,62 47,58 53,58" fill="#C9A84C" opacity="0.8"/>
  <polygon points="148,62 150,56 152,62 147,58 153,58" fill="#C9A84C" opacity="0.8"/>
</svg>
